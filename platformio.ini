; Chibi StackChan - PlatformIO project
;
; Target: M5Stack ATOMS3R (ESP32-S3, 8MB Flash + 8MB PSRAM)
;         + Atomic Echo Base (ES8311 codec: mic + speaker) = "AI Chatbot Kit"
; AI:  Gemini (LLM) + OpenAI Whisper (STT) + VoiceVox (TTS)
; Servo: 1x SG90 (PWM) on Grove port - left/right head shake only
;
; NOTE: guruguru-stackchan (Core2) と違い esp-sr / SimpleVox を使わないため
;       framework = arduino 単独でビルドできる (IRAM 問題なし)。

[platformio]
default_envs = atoms3r

[env:atoms3r]
platform = espressif32@6.9.0
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = default_8MB.csv
; ATOMS3R = ESP32-S3-PICO-1-N8R8 (8MB Flash QIO + 8MB PSRAM OPI)
; 素の m5stack-atoms3 ボード定義は無印 AtomS3 (PSRAM 無し) なので上書きする
board_build.arduino.memory_type = qio_opi
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ; Atomic Echo Base (ES8311) 対応は M5Unified 0.2.x 以降
    m5stack/M5Unified @ ^0.2.7
    earlephilhower/ESP8266Audio @ ^1.9.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0
    bblanchon/ArduinoJson @ ^6
